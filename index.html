<!DOCTYPE html>
<html>
<head>
  <title>CognifyAI Reset Password</title>
</head>
<body>
  <h2>Opening CognifyAI...</h2>

  <script>
    const params = new URLSearchParams(window.location.search);

    const userId = params.get("userId");
    const secret = params.get("secret");

    window.location.href =
      `cognifyai://reset-password?userId=${userId}&secret=${secret}`;
  </script>
</body>
</html>
