<!DOCTYPE html>
<html>
<head>
  <title>CognifyAI Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: Arial; text-align: center; padding-top: 60px;">

  <h2>Reset Password</h2>
  <p>Tap the button below to open CognifyAI.</p>

  <button
    id="openApp"
    style="
      padding: 14px 24px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #000;
      color: white;
      cursor: pointer;
    "
  >
    Open CognifyAI
  </button>

  <script>
    const params = new URLSearchParams(window.location.search);

    const userId = params.get("userId");
    const secret = params.get("secret");

    const deepLink =
      `cognifyai://reset-password?userId=${userId}&secret=${secret}`;

    document
      .getElementById("openApp")
      .addEventListener("click", () => {
        window.location.href = deepLink;
      });
  </script>

</body>
</html>
